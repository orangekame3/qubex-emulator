[project]
name = "qubex-emulator"
version = "0.1.0"
description = "Emulation plugin for qubex pulse-level experiments"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "qubex",
    "plotly>=5.17.0",
    "scipy>=1.11.0",
    "numpy>=1.24.0",
    "jupyter>=1.0.0",
    "kaleido>=0.2.1",
    "pyyaml>=6.0.3",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "black>=23.0.0",
    "ruff>=0.1.0",
]

[tool.uv.sources]
qubex = { git = "https://github.com/amachino/qubex.git", branch="feat/mock-mode"}

[dependency-groups]
dev = [
    "kaleido>=0.2.1",
    "pytest>=9.0.2",
]
